name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
           dotnet-version: '9.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./FSharp/Tests

      - name: Run tests .NET
        run: dotnet run
        working-directory: ./FSharp/Tests


